min_version: 2.1.10

pre-commit:
  parallel: false
  commands:
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
    format:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,md,yml,yaml}"
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    check-types:
      run: pnpm run check-types
