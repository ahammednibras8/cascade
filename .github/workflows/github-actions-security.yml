name: GitHub Actions Security

on:
  pull_request:
    paths:
      - ".github/**"
  push:
    branches: [main]
    paths:
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check workflow files
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@v0.6.0
        continue-on-error: true
        with:
          inputs: .github/workflows
          advanced-security: false
          annotations: true
          min-severity: medium
          min-confidence: medium
