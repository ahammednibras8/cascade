name: Publish Web Image

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-web-image.yml"
      - ".dockerignore"
      - "apps/web/**"
      - ".configs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-web-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and push web image
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/ahammednibras8/cascade-web:${{ github.sha }}
            ghcr.io/ahammednibras8/cascade-web:latest
          cache-from: type=gha,scope=cascade-web
          cache-to: type=gha,scope=cascade-web,mode=max
