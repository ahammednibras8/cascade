name: Publish Web Image

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-dashboard-image.yml"
      - ".dockerignore"
      - "apps/dashboard/**"
      - ".configs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-dashboard-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and push dashboard image
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/ahammednibras8/cascade-dashboard:${{ github.sha }}
            ghcr.io/ahammednibras8/cascade-dashboard:latest
          cache-from: type=gha,scope=cascade-dashboard
          cache-to: type=gha,scope=cascade-dashboard,mode=max
